# Lab 1.2 - F-01: Cấm image tag :latest
# ConstraintTemplate lấy từ gatekeeper-library (block-latest-image)
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblocklatestimage
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  crd:
    spec:
      names:
        kind: K8sBlockLatestImage
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8sblocklatestimage

      violation[{"msg": msg}] {
        container := input_containers[_]
        endswith(container.image, ":latest")
        msg := sprintf("Container '%v' dùng tag :latest — bị cấm. Dùng tag version cụ thể.", [container.name])
      }

      violation[{"msg": msg}] {
        container := input_containers[_]
        not contains(container.image, ":")
        msg := sprintf("Container '%v' không có tag — mặc định :latest bị cấm. Thêm tag version cụ thể.", [container.name])
      }

      input_containers[c] {
        c := input.review.object.spec.containers[_]
      }

      input_containers[c] {
        c := input.review.object.spec.initContainers[_]
      }

      input_containers[c] {
        c := input.review.object.spec.template.spec.containers[_]
      }

      input_containers[c] {
        c := input.review.object.spec.template.spec.initContainers[_]
      }

---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sBlockLatestImage
metadata:
  name: block-latest-image
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  enforcementAction: deny
  match:
    kinds:
    - apiGroups: ["apps", "argoproj.io"]
      kinds: ["Deployment", "StatefulSet", "DaemonSet", "Rollout"]
    namespaces:
    - demo
