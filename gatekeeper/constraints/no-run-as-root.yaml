# Lab 1.2 - F-04: Cấm runAsUser: 0 (chạy root)
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8snorunasroot
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  crd:
    spec:
      names:
        kind: K8sNoRunAsRoot
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8snorunasroot

      violation[{"msg": msg}] {
        container := input_containers[_]
        container.securityContext.runAsUser == 0
        msg := sprintf("Container '%v' set runAsUser: 0 (root) — bị cấm.", [container.name])
      }

      violation[{"msg": msg}] {
        spec := input.review.object.spec.template.spec
        spec.securityContext.runAsUser == 0
        msg := "Pod securityContext runAsUser: 0 (root) — bị cấm."
      }

      violation[{"msg": msg}] {
        spec := input.review.object.spec.template.spec
        spec.securityContext.runAsNonRoot == false
        msg := "Pod securityContext runAsNonRoot: false — bị cấm."
      }

      input_containers[c] {
        c := input.review.object.spec.containers[_]
      }

      input_containers[c] {
        c := input.review.object.spec.template.spec.containers[_]
      }

---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sNoRunAsRoot
metadata:
  name: no-run-as-root
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  enforcementAction: deny
  match:
    kinds:
    - apiGroups: ["apps", "argoproj.io"]
      kinds: ["Deployment", "StatefulSet", "DaemonSet", "Rollout"]
    namespaces:
    - demo
