# Lab 1.2 - F-02: Bắt buộc có resources.limits
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequirelimits
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  crd:
    spec:
      names:
        kind: K8sRequireLimits
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8srequirelimits

      violation[{"msg": msg}] {
        container := input_containers[_]
        not container.resources.limits
        msg := sprintf("Container '%v' thiếu resources.limits — bắt buộc phải khai báo.", [container.name])
      }

      violation[{"msg": msg}] {
        container := input_containers[_]
        container.resources.limits
        not container.resources.limits.cpu
        msg := sprintf("Container '%v' thiếu resources.limits.cpu.", [container.name])
      }

      violation[{"msg": msg}] {
        container := input_containers[_]
        container.resources.limits
        not container.resources.limits.memory
        msg := sprintf("Container '%v' thiếu resources.limits.memory.", [container.name])
      }

      input_containers[c] {
        c := input.review.object.spec.containers[_]
      }

      input_containers[c] {
        c := input.review.object.spec.template.spec.containers[_]
      }

---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireLimits
metadata:
  name: require-resource-limits
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  enforcementAction: deny
  match:
    kinds:
    - apiGroups: ["apps", "argoproj.io"]
      kinds: ["Deployment", "StatefulSet", "DaemonSet", "Rollout"]
    namespaces:
    - demo
